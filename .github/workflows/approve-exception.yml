name: Approve Security Exception

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  approve-exception:
    if: contains(github.event.comment.body, '/approve-exception')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract PR number
        id: pr
        run: echo "pr_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Update exception file
        run: |
          FILE=".security-exceptions/exception-${{ steps.pr.outputs.pr_number }}.json"

          if [ ! -f "$FILE" ]; then
            echo "No exception file found for this PR"
            exit 1
          fi

          jq '.status = "APPROVED"' "$FILE" > tmp.json && mv tmp.json "$FILE"

      - name: Commit approval
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .security-exceptions/
          git commit -m "Approved security exception for PR #${{ steps.pr.outputs.pr_number }}"
          git push

      - name: Notify PR
        run: |
          gh pr comment ${{ steps.pr.outputs.pr_number }} \
            --body "✅ **Security Exception Approved**  
            This PR now bypasses CRITICAL DevSecOps findings."
