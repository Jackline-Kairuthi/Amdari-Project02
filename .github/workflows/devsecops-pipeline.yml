
name: DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  hello-world:
    name: Hello World
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello World
        run: echo "Hello World from DevSecOps Pipeline!"

  gitleaks-scan:
    name: Gitleaks Full History Scan
    runs-on: ubuntu-latest
    needs: hello-world
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq wget ca-certificates

      - name: Install Gitleaks binary (robust)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64 -o gitleaks-temp
          chmod +x gitleaks-temp
          sudo mv gitleaks-temp /usr/local/bin/gitleaks
          echo "Installed gitleaks at $(which gitleaks)"
          gitleaks version || true

      - name: Debug workspace before run
        run: |
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          pwd
          echo "Root listing:"
          ls -la
          echo ".github listing:"
          ls -la .github || true
          echo "Show head of .gitleaks.toml"
          sed -n '1,200p' "${GITHUB_WORKSPACE}/.gitleaks.toml" || true

      - name: Run Gitleaks (capture stdout/stderr, always continue)
        run: |
          set +e
          OUT="${GITHUB_WORKSPACE}/gitleaks-out.log"
          ERR="${GITHUB_WORKSPACE}/gitleaks-err.log"
          REPORT="${GITHUB_WORKSPACE}/gitleaks-report.json"
          echo "Running gitleaks; stdout->${OUT} stderr->${ERR} report->${REPORT}"
          /usr/local/bin/gitleaks detect \
            --source "${GITHUB_WORKSPACE}" \
            --log-opts="--all" \
            --config "${GITHUB_WORKSPACE}/.gitleaks.toml" \
            --report-format json \
            --report-path "${REPORT}" \
            --redact --verbose > "${OUT}" 2> "${ERR}"
          EXIT_CODE=$?
          echo "Gitleaks exit code: $EXIT_CODE"
          echo "=== STDOUT (first 200 lines) ==="
          sed -n '1,200p' "${OUT}" || true
          echo "=== STDERR (first 200 lines) ==="
          sed -n '1,200p' "${ERR}" || true
          # do not fail here; next step will validate the report
          exit 0

      - name: Show workspace after run
        run: |
          echo "Workspace listing after gitleaks:"
          ls -la "${GITHUB_WORKSPACE}" || true
          echo "Show report file if present:"
          ls -la "${GITHUB_WORKSPACE}/gitleaks-report.json" || true
          echo "Show captured logs (short):"
          sed -n '1,200p' "${GITHUB_WORKSPACE}/gitleaks-out.log" || true
          sed -n '1,200p' "${GITHUB_WORKSPACE}/gitleaks-err.log" || true

      - name: Upload Gitleaks Findings Artefact (logs + report)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-findings
          path: |
            gitleaks-report.json
            gitleaks-out.log
            gitleaks-err.log

      - name: Hard-fail on any Gitleaks finding or missing report
        if: always()
        run: |
          REPORT="${GITHUB_WORKSPACE}/gitleaks-report.json"
          if [ ! -f "${REPORT}" ]; then
            echo "ERROR: ${REPORT} not found. Gitleaks did not produce output or crashed."
            echo "Check gitleaks-err.log and gitleaks-out.log artifacts for details."
            exit 1
          fi

          count=$(jq 'if type=="array" then length elif has("leaks") then .leaks|length else 0 end' "${REPORT}" || echo 0)
          echo "Gitleaks findings count: $count"

          if [ "$count" -gt 0 ]; then
            echo "Gitleaks detected secrets. Failing job."
            jq '.' "${REPORT}" || true
            exit 1
          else
            echo "No leaks found by Gitleaks."
          fi

  sonar-scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

  quality-gate:
    name: Sonar Quality Gate
    runs-on: ubuntu-latest
    needs: sonar-scan
    steps:
      - name: Wait for SonarCloud Quality Gate
        id: gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Download Sonar Issues JSON
        run: |
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "${{ secrets.SONAR_HOST_URL }}/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}" \
            -o sonar-findings.json || true

      - name: Upload Sonar Findings Artefact
        uses: actions/upload-artifact@v4
        with:
          name: sonar-findings
          path: sonar-findings.json

      - name: Hard-fail only on CRITICAL/BLOCKER
        run: |
          status="${{ steps.gate.outputs.quality-gate-status }}"
          echo "Quality Gate status: $status"
          if [ "$status" = "ERROR" ]; then
            echo "CRITICAL/BLOCKER issues detected. Failing pipeline."
            exit 1
          else
            echo "No CRITICAL/BLOCKER issues. Passing pipeline."
            exit 0

