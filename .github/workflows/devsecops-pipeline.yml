name: DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello World
        run: echo "Hello World from DevSecOps Pipeline!"

  gitleaks-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
          clean: true

      - name: Run Gitleaks with custom rules
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --log-opts="--all" --config=.gitleaks.toml --verbose --redact --report-format=json --report-path=gitleaks-report.json

      - name: Upload Gitleaks Findings Artefact
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-findings
          path: gitleaks-report.json

  sonar-scan:
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

  quality-gate:
    runs-on: ubuntu-latest
    needs: sonar-scan
    steps:
      - name: Wait for SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Download Sonar Issues JSON
        run: |
          curl -u "${{ secrets.SONAR_TOKEN }}:" \
          "${{ secrets.SONAR_HOST_URL }}/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}" \
          -o sonar-findings.json

      - name: Upload Sonar Findings Artefact
        uses: actions/upload-artifact@v4
        with:
          name: sonar-findings
          path: sonar-findings.json
