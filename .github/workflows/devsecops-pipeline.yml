name: DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello World
        run: echo "Hello World from DevSecOps Pipeline!"

  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for --all

      - name: Run Gitleaks (full history)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --log-opts="--all"
