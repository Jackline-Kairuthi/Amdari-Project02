
name: DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello World from DevSecOps Pipeline!"

  gitleaks-scan:
    runs-on: ubuntu-latest
    needs: hello-world
    steps:
      - uses: actions/checkout@v4
        with: fetch-depth: 0

      - name: Install deps and Gitleaks
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq wget
          wget -qO /tmp/gitleaks https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64
          chmod +x /tmp/gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version || true

      - name: Ensure config exists
        run: |
          if [ ! -f "${GITHUB_WORKSPACE}/.gitleaks.toml" ]; then
            echo "Missing .gitleaks.toml"; exit 1
          fi

      - name: Run Gitleaks (full history) and produce JSON
        run: |
          set -o pipefail
          /usr/local/bin/gitleaks detect \
            --source "${GITHUB_WORKSPACE}" \
            --log-opts="--all" \
            --config "${GITHUB_WORKSPACE}/.gitleaks.toml" \
            --report-format json \
            --report-path "${GITHUB_WORKSPACE}/gitleaks-report.json" \
            --redact
          echo "GITLEAKS_EXIT=$?" > gitleaks-exit.txt

      - name: Upload Gitleaks artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-findings
          path: |
            gitleaks-report.json
            gitleaks-exit.txt

      - name: Fail on any Gitleaks finding
        if: always()
        run: |
          if [ ! -f gitleaks-report.json ]; then
            echo "gitleaks-report.json missing"; exit 1
          fi
          count=$(jq 'if type=="array" then length elif has("leaks") then .leaks|length else 0 end' gitleaks-report.json 2>/dev/null || echo 0)
          echo "Gitleaks findings: $count"
          if [ "$count" -gt 0 ]; then
            jq '.' gitleaks-report.json || true
            exit 1
          fi

  sonar-scan:
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

      - name: Download Sonar Issues JSON
        run: |
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "${{ secrets.SONAR_HOST_URL }}/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}&ps=500" \
            -o sonar-findings.json || true

      - name: Upload Sonar Findings Artefact
        uses: actions/upload-artifact@v4
        with:
          name: sonar-findings
          path: sonar-findings.json

  quality-gate:
    runs-on: ubuntu-latest
    needs: sonar-scan
    steps:
      - name: Wait for SonarCloud Quality Gate
        id: gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Gate decision (CRITICAL/BLOCKER only)
        run: |
          status="${{ steps.gate.outputs.quality-gate-status }}"
          echo "Quality Gate status: $status"
          if [ "$status" = "ERROR" ]; then
            echo "Failing on CRITICAL/BLOCKER"
            exit 1
          fi
          echo "Non-CRITICAL issues allowed; passing."
