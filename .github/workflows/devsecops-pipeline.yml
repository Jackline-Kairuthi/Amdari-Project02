
name: DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  hello-world:
    name: Hello World
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello World
        run: echo "Hello World from DevSecOps Pipeline!"

  gitleaks-scan:
    name: Gitleaks Full History Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq wget ca-certificates tar

      - name: Install Gitleaks (correct tar.gz method)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks (always continue)
        run: |
          set +e
          OUT="gitleaks-out.log"
          ERR="gitleaks-err.log"
          REPORT="gitleaks-report.json"

          gitleaks detect \
            --source "${GITHUB_WORKSPACE}" \
            --config "${GITHUB_WORKSPACE}/.gitleaks.toml" \
            --log-opts="--all" \
            --report-format json \
            --report-path "${REPORT}" \
            --redact --verbose > "${OUT}" 2> "${ERR}"

          echo "Gitleaks exit code: $?"
          exit 0

      - name: Upload Gitleaks Findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-findings
          path: |
            gitleaks-report.json
            gitleaks-out.log
            gitleaks-err.log

      - name: Hard-fail on any Gitleaks finding
        if: always()
        run: |
          if [ ! -f gitleaks-report.json ]; then
            echo "ERROR: gitleaks-report.json missing"
            exit 1
          fi

          count=$(jq 'if type=="array" then length elif has("leaks") then .leaks|length else 0 end' gitleaks-report.json || echo 0)
          echo "Findings: $count"

          if [ "$count" -gt 0 ]; then
            echo "Leaks detected — failing Stage 1"
            exit 1
          fi

          echo "No leaks detected"

  sonar-scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

      - name: Download Sonar Issues JSON
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          curl -s -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/issues/search?componentKeys=${SONAR_PROJECT_KEY}&ps=500" \
            -o sonar-issues.json || true

      - name: Export Sonar Issues CSV
        run: |
          jq -r '.issues[] | [.key, .rule, .severity, .component, (.line // ""), .message] | @csv' sonar-issues.json > sonar-issues.csv || true

      - name: Upload Sonar Findings
        uses: actions/upload-artifact@v4
        with:
          name: sonar-findings
          path: |
            sonar-issues.json
            sonar-issues.csv

  quality-gate:
    name: Sonar Quality Gate
    runs-on: ubuntu-latest
    needs: sonar-scan
    if: always()
    steps:
      - name: Wait for SonarCloud Quality Gate
        id: gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Hard-fail only on CRITICAL/BLOCKER
        run: |
          status="${{ steps.gate.outputs.quality-gate-status }}"
          echo "Quality Gate: $status"

          if [ "$status" = "ERROR" ]; then
            echo "CRITICAL/BLOCKER issues detected — failing Stage 2"
            exit 1
          fi

          echo "Quality Gate passed (no CRITICAL/BLOCKER)"
          exit 0

  trivy-image-scan:
    name: Trivy Image Scan (CK-01)
    runs-on: ubuntu-latest
    needs: quality-gate
    if: always()
    steps:
      - name: Install Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Scan python:3.9-slim for HIGH/CRITICAL CVEs
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 1 --format json -o trivy-image-report.json python:3.9-slim

      - name: Upload Trivy Image Findings
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-findings
          path: trivy-image-report.json
         
  trivy-k8s-scan:
    name: Trivy K8s Config Scan (CK-04 to CK-09)
    runs-on: ubuntu-latest
    needs: trivy-image-scan
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Scan Kubernetes manifests
        run: |
          trivy config --format json -o trivy-k8s-report.json infra/kubernetes/

      - name: Upload Trivy K8s Findings
        uses: actions/upload-artifact@v4
        with:
          name: trivy-k8s-findings
          path: trivy-k8s-report.json

  checkov-scan:
    name: Checkov IaC Scan (IV-08 to IV-10)
    runs-on: ubuntu-latest
    needs: trivy-k8s-scan
    if: always()
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Checkov
      run: |
        pip install checkov

    - name: Run Checkov on Terraform
      run: |
        checkov -d infra/terraform/ -o json > checkov-report.json || true

    - name: Upload Checkov Findings
      uses: actions/upload-artifact@v4
      with:
        name: checkov-findings
        path: checkov-report.json

    - name: Hard-fail on HIGH/CRITICAL IaC issues
      run: |
        HIGH=$(jq '[.results.failed_checks[] | select(.severity=="HIGH")] | length' checkov-report.json)
        CRIT=$(jq '[.results.failed_checks[] | select(.severity=="CRITICAL")] | length' checkov-report.json)

        echo "HIGH: $HIGH"
        echo "CRITICAL: $CRIT"

        if [ "$HIGH" -gt 0 ] || [ "$CRIT" -gt 0 ]; then
          echo "IaC misconfigurations detected — failing Stage 5"
          exit 1
        fi

        echo "No HIGH/CRITICAL IaC issues"

