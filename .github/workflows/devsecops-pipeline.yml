
name: DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  hello-world:
    name: Hello World
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello World
        run: echo "Hello World from DevSecOps Pipeline!"

  gitleaks-scan:
    name: Gitleaks Full History Scan
    runs-on: ubuntu-latest
    needs: hello-world
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks + jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq wget
          wget https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64
          chmod +x gitleaks-linux-amd64
          sudo mv gitleaks-linux-amd64 /usr/local/bin/gitleaks

      - name: Run Gitleaks with custom config
        run: |
          echo "Running Gitleaks..."
          set +e
          gitleaks detect \
            --source "${GITHUB_WORKSPACE}" \
            --log-opts="--all" \
            --config "${GITHUB_WORKSPACE}/.gitleaks.toml" \
            --report-format json \
            --report-path "${GITHUB_WORKSPACE}/gitleaks-report.json" \
            --redact
          EXIT_CODE=$?
          echo "Gitleaks exit code: $EXIT_CODE"
          echo "Gitleaks finished."
          exit 0

      - name: Upload Gitleaks Findings Artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-findings
          path: gitleaks-report.json

      - name: Hard-fail on any Gitleaks finding
        if: always()
        run: |
          if [ ! -f gitleaks-report.json ]; then
            echo "ERROR: gitleaks-report.json not found. Gitleaks crashed before writing output."
            exit 1
          fi

          count=$(jq 'if type=="array" then length elif has("leaks") then .leaks|length else 0 end' gitleaks-report.json || echo 0)
          echo "Gitleaks findings count: $count"

          if [ "$count" -gt 0 ]; then
            echo "Gitleaks detected secrets. Failing job."
            jq '.' gitleaks-report.json || true
            exit 1
          fi

  sonar-scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

  quality-gate:
    name: Sonar Quality Gate
    runs-on: ubuntu-latest
    needs: sonar-scan
    steps:
      - name: Wait for SonarCloud Quality Gate
        id: gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Download Sonar Issues JSON
        run: |
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "${{ secrets.SONAR_HOST_URL }}/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}" \
            -o sonar-findings.json || true

      - name: Upload Sonar Findings Artefact
        uses: actions/upload-artifact@v4
        with:
          name: sonar-findings
          path: sonar-findings.json

      - name: Hard-fail only on CRITICAL/BLOCKER
        run: |
          status="${{ steps.gate.outputs.quality-gate-status }}"
          echo "Quality Gate status: $status"

          if [ "$status" = "ERROR" ]; then
            echo "CRITICAL/BLOCKER issues detected. Failing pipeline."
            exit 1
          else
            echo "No CRITICAL/BLOCKER issues. Passing pipeline."
            exit 0
