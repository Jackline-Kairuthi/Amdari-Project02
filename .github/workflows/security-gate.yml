name: Security Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:

  # ---------------------------------------------------------
  # 1. SECRET SCAN (Gitleaks)
  # ---------------------------------------------------------
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64 -o gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --report-format json \
            --report-path secret-scan.json || true

          if [ ! -f secret-scan.json ]; then
            echo "{}" > secret-scan.json
          fi

      - name: Upload secret-scan results
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan
          path: secret-scan.json

  # ---------------------------------------------------------
  # 2. SAST SCAN (SonarCloud)
  # ---------------------------------------------------------
  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

      - name: Download Sonar Issues JSON
        run: |
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "${{ secrets.SONAR_HOST_URL }}/api/issues/search?componentKeys=${{ secrets.SONAR_PROJECT_KEY }}&ps=500" \
            -o sast-scan.json || true

      - name: Upload sast-scan results
        uses: actions/upload-artifact@v4
        with:
          name: sast-scan
          path: sast-scan.json

  # ---------------------------------------------------------
  # 3. IMAGE SCAN (Trivy)
  # ---------------------------------------------------------
  image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Scan image
        run: |
          trivy image --format json -o image-scan.json python:3.9-slim || true

      - name: Upload image-scan results
        uses: actions/upload-artifact@v4
        with:
          name: image-scan
          path: image-scan.json

  # ---------------------------------------------------------
  # 4. IAC SCAN (Checkov)
  # ---------------------------------------------------------
  iac-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov (Terraform IaC)
        run: |
          checkov -d iac -o json > iac-scan.json

      - name: Ensure iac-scan.json exists
        run: |
          if [ ! -f iac-scan.json ]; then
            echo "{}" > iac-scan.json
          fi

      - name: Upload iac-scan results
        uses: actions/upload-artifact@v4
        with:
          name: iac-scan
          path: iac-scan.json

  # ---------------------------------------------------------
  # 5. SECURITY GATE (FINAL DECISION)
  # ---------------------------------------------------------
  security-gate:
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, image-scan, iac-scan]
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Download secret-scan
        uses: actions/download-artifact@v4
        with:
          name: secret-scan
          path: scans

      - name: Download sast-scan
        uses: actions/download-artifact@v4
        with:
          name: sast-scan
          path: scans

      - name: Download image-scan
        uses: actions/download-artifact@v4
        with:
          name: image-scan
          path: scans

      - name: Download iac-scan
        uses: actions/download-artifact@v4
        with:
          name: iac-scan
          path: scans

      - name: Run Security Gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ENVIRONMENT: ${{ github.base_ref == 'main' && 'production' || 'nonprod' }}
        run: |
          chmod +x pipeline/scripts/security-gate.sh
          ./pipeline/scripts/security-gate.sh scans
