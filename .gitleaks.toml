#detect Custom Rules for Flask + DB Secrets

title = "Custom Gitleaks Rules for SecureFlow"

[[rules]]
id = "postgres-password"
description = "Detect Postgres hardcoded passwords"
regex = '''(?i)POSTGRES_PASSWORD\s*[:=]\s*["']?[A-Za-z0-9._%+-]{4,}["']?'''
tags = ["secret", "postgres", "password"]

[[rules]]
id = "db-password"
description = "Detect DB passwords"
regex = '''(?i)DB_PASSWORD\s*[:=]\s*["']?[A-Za-z0-9._%+-]{4,}["']?'''
tags = ["secret", "database", "password"]

[[rules]]
id = "jwt-secret"
description = "Detect JWT secrets"
regex = '''(?i)JWT_SECRET\s*[:=]\s*["']?[A-Za-z0-9._%+-]{6,}["']?'''
tags = ["secret", "jwt"]

[[rules]]
id = "session-secret"
description = "Detect SESSION_SECRET"
regex = '''(?i)SESSION_SECRET\s*[:=]\s*["']?[A-Za-z0-9._%+-]{4,}["']?'''
tags = ["secret", "session"]

[[rules]]
id = "github-token"
description = "Detect GitHub-style tokens"
regex = '''(?i)GITHUB_TOKEN\s*[:=]\s*["']?[A-Za-z0-9/_+=-]{20,}["']?'''
tags = ["secret", "github"]

[allowlist]
paths = [
  '''\.md$''',
  '''LICENSE'''
]
