#detect Custom Rules for Flask + DB Secrets

title = "Custom Gitleaks Rules for SecureFlow"

[extend]
useDefault = true

[[rules]]
id = "flask-secret-key"
description = "Detect Flask SECRET_KEY"
regex = '''(?i)SECRET_KEY\s*[:=]\s*["']?[A-Za-z0-9._%+/=-]{6,}["']?'''
tags = ["secret", "flask", "key"]

[[rules]]
id = "flask-session-secret"
description = "Detect Flask SESSION_SECRET"
regex = '''(?i)SESSION_SECRET\s*[:=]\s*["']?[A-Za-z0-9._%+/=-]{6,}["']?'''
tags = ["secret", "flask", "session"]

[[rules]]
id = "jwt-secret"
description = "Detect JWT secret keys"
regex = '''(?i)JWT_SECRET\s*[:=]\s*["']?[A-Za-z0-9._%+/=-]{6,}["']?'''
tags = ["secret", "jwt", "token"]

[[rules]]
id = "db-password"
description = "Detect DB_PASSWORD"
regex = '''(?i)DB_PASSWORD\s*[:=]\s*["']?[A-Za-z0-9._%+/=-]{3,}["']?'''
tags = ["secret", "database", "password"]

[[rules]]
id = "postgres-password"
description = "Detect POSTGRES_PASSWORD"
regex = '''(?i)POSTGRES_PASSWORD\s*[:=]\s*["']?[A-Za-z0-9._%+/=-]{3,}["']?'''
tags = ["secret", "postgres", "password"]

[[rules]]
id = "db-connection-string"
description = "Detect DB connection strings"
regex = '''(?i)(postgres(ql)?|mysql)://[A-Za-z0-9._%+-]+:[A-Za-z0-9._%+-]+@[A-Za-z0-9._%+-]+:[0-9]+/[A-Za-z0-9._%+-]+'''
tags = ["secret", "database", "connection-string"]

[[rules]]
id = "sqlalchemy-uri"
description = "Detect SQLAlchemy URIs"
regex = '''(?i)SQLALCHEMY_DATABASE_URI\s*=\s*["']?(postgresql|mysql|sqlite)://[^"']+'''
tags = ["secret", "sqlalchemy", "database"]

[allowlist]
paths = [
  '''\.md$''',
  '''LICENSE'''
]
