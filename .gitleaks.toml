#detect Custom Rules for Flask + DB Secrets

title = "SecureFlow Gitleaks Rules — FINAL WORKING VERSION"

# -------------------------------
# GENERIC PASSWORD DETECTION
# -------------------------------
[[rules]]
id = "generic-password"
description = "Detect any password assignment"
regex = '''(?i)(password|passwd|pwd)\s*[:=]\s*["']?[A-Za-z0-9._%+-]{3,}["']?'''
tags = ["secret", "password"]

# -------------------------------
# POSTGRES PASSWORDS
# -------------------------------
[[rules]]
id = "postgres-password"
description = "Detect Postgres hardcoded passwords"
regex = '''(?i)POSTGRES_PASSWORD\s*[:=]\s*["']?[A-Za-z0-9._%+-]{3,}["']?'''
tags = ["secret", "postgres"]

# -------------------------------
# DB_PASSWORD (auth + transaction)
# -------------------------------
[[rules]]
id = "db-password"
description = "Detect DB_PASSWORD values"
regex = '''(?i)DB_PASSWORD\s*[:=]\s*["']?[A-Za-z0-9._%+-]{3,}["']?'''
tags = ["secret", "database"]

# -------------------------------
# JWT SECRET
# -------------------------------
[[rules]]
id = "jwt-secret"
description = "Detect JWT_SECRET"
regex = '''(?i)JWT_SECRET\s*[:=]\s*["']?[A-Za-z0-9._%+-]{3,}["']?'''
tags = ["secret", "jwt"]

# -------------------------------
# SESSION SECRET
# -------------------------------
[[rules]]
id = "session-secret"
description = "Detect SESSION_SECRET"
regex = '''(?i)SESSION_SECRET\s*[:=]\s*["']?[A-Za-z0-9._%+-]{3,}["']?'''
tags = ["secret", "session"]

# -------------------------------
# GITHUB TOKEN
# -------------------------------
[[rules]]
id = "github-token"
description = "Detect GitHub-style tokens"
regex = '''(?i)GITHUB_TOKEN\s*[:=]\s*["']?[A-Za-z0-9/_+=-]{10,}["']?'''
tags = ["secret", "github"]

# -------------------------------
# ALLOWLIST
# -------------------------------
[allowlist]
paths = [
  '''\.md$''',
  '''LICENSE'''
]
